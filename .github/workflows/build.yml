name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # windows-latest is Windows Server 2025 with Visual Studio 2026,
    # matching the local development environment (MSVC v145, C++20).
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      # The preinstalled C:\vcpkg is a shallow clone whose checkout may be
      # older than the pinned builtin-baseline. baseline.json is read from
      # the baseline commit via git, but the versions database and ports are
      # read from the working tree, so fetch the commit AND move the
      # checkout onto it - otherwise ports newer than the image (e.g.
      # libjpeg-turbo 3.2.0) resolve to "no version database entry".
      - name: Pin vcpkg to the manifest baseline
        shell: pwsh
        run: |
          $baseline = (Get-Content vcpkg.json -Raw | ConvertFrom-Json).'builtin-baseline'
          git -C $env:VCPKG_INSTALLATION_ROOT fetch --depth 1 origin $baseline
          git -C $env:VCPKG_INSTALLATION_ROOT checkout --force $baseline

      - name: Configure and build (Release)
        shell: cmd
        run: |
          rem Locate the latest Visual Studio with the C++ toolset via vswhere
          rem instead of hardcoding an edition/version path.
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSPATH=%%i"
          if not defined VSPATH (echo Visual Studio with C++ tools not found & exit /b 1)
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat"
          rem CMakePresets.json expects VCPKG_ROOT; the runner image provides
          rem a preinstalled vcpkg via VCPKG_INSTALLATION_ROOT.
          set "VCPKG_ROOT=%VCPKG_INSTALLATION_ROOT%"
          cmake --preset release
          if errorlevel 1 exit /b 1
          cmake --build --preset release

      # Optional JPEG codec shipped alongside the exe. Classic-mode vcpkg
      # refuses to run inside a manifest directory, hence the working-directory.
      - name: Build optional turbojpeg.dll
        shell: cmd
        working-directory: ${{ runner.temp }}
        run: vcpkg install libjpeg-turbo:x64-windows

      - name: Stage artifact contents
        shell: cmd
        run: |
          mkdir dist
          mkdir dist\licenses
          copy build\release\chirami.exe dist\
          copy README.md dist\
          copy LICENSE dist\
          copy "%VCPKG_INSTALLATION_ROOT%\installed\x64-windows\bin\turbojpeg.dll" dist\
          copy "%VCPKG_INSTALLATION_ROOT%\installed\x64-windows\share\libjpeg-turbo\copyright" dist\licenses\libjpeg-turbo.txt

      - uses: actions/upload-artifact@v7
        with:
          name: chirami-win64
          path: dist/
          if-no-files-found: error
